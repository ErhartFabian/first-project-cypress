name: Cypress Tests
on: [push]
jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false 
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cypress run
        uses: cypress-io/github-action@v4
        id: cypress # Añadimos un ID para referenciarlo si es necesario
        with:
          browser: chrome
          # Nota: 'install' suele ser automático, pero mantenemos tu configuración
          install: yarn add cypress --dev && yarn install 
          start: npx cypress run --record --key ${{ secrets.CYPRESS_RECORD_KEY }}
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- ESTA ES LA PARTE QUE DEBES AGREGAR/ASEGURAR ---
      # Si usas una acción específica para el resumen (summary), 
      # debes ponerle el "if: always()"
      - name: Publish Cypress Report Summary
        if: always() # Esto garantiza que se ejecute aunque el paso anterior falle
        run: |
          echo "Generando resumen de resultados..."
          # Si tu resumen depende de un plugin de GitHub Actions, 
          # asegúrate de que ese paso tenga esta condición.
