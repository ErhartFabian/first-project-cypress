name: Cypress Tests
on: [push]
jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # AQUÍ DEFINES CUÁNTAS MÁQUINAS QUIERES (ej. 3 máquinas)
      matrix:
        containers: [1, 2, 3] 
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          record: true
          # ESTO ACTIVA LA REPARTICIÓN DE TESTS
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Summary
        if: always()
        run: echo "Finalizado en el contenedor ${{ matrix.containers }}" >> $GITHUB_STEP_SUMMARY
