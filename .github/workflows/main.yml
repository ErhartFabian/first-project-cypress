name: Cypress Tests
on: [push]

# ESTO SOLUCIONA EL ERROR "Resource not accessible"
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Si decidiste usar paralelismo, mantén el matrix. Si no, puedes borrarlo.
      matrix:
        containers: [1,2,3] 
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          install: yarn install
          record: true
          parallel: true # Solo si usas matrix, si no, cámbialo a false
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Cypress Report Summary
        if: always()
        run: |
          echo "### Cypress Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "Ejecución finalizada. Revisa los detalles en Cypress Cloud." >> $GITHUB_STEP_SUMMARY
